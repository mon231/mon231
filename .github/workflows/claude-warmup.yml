name: Claude warmup

on:
  schedule:
    - cron: "0 0,4,9,14,19 * * *"
  workflow_dispatch:

jobs:
  warmup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 26

      - name: install claude-code
        run: npm install -g @anthropic-ai/claude-code

      - run: echo "warmup" | claude -p
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
